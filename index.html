<!DOCTYPE html>
<html>
<head>
  <title>GIRI METAL INDUSTRIES</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    html { scroll-behavior: smooth; }

    body {
      margin:0;
      font-family:'Poppins',sans-serif;
      color:white;
      background: linear-gradient(-45deg,#000,#0f2027,#203a43,#000);
      background-size:400% 400%;
      animation:bgMove 12s ease infinite;
    }

    @keyframes bgMove {
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }

    /* Glow balls */
    body::before, body::after {
      content:"";
      position:fixed;
      width:300px;
      height:300px;
      border-radius:50%;
      filter:blur(120px);
      z-index:-1;
    }

    body::before {
      background:#00f0ff;
      top:10%;
      left:10%;
      animation:move1 10s infinite alternate;
    }

    body::after {
      background:#ff00ff;
      bottom:10%;
      right:10%;
      animation:move2 12s infinite alternate;
    }

    @keyframes move1 { to { transform:translate(200px,200px);} }
    @keyframes move2 { to { transform:translate(-200px,-150px);} }

    header {
      text-align:center;
      padding:15px;
      background:rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
    }

    header h1 {
      text-shadow:0 0 10px #00f0ff;
    }

    nav a {
      margin:0 10px;
      color:white;
      text-decoration:none;
    }

    nav a:hover { color:#00f0ff; }

    /* FILTER BUTTONS */
    .filters {
      text-align:center;
      margin:20px;
    }

    .filters button {
      padding:8px 15px;
      margin:5px;
      border:none;
      background:#00f0ff;
      color:black;
      border-radius:5px;
      cursor:pointer;
    }

    /* PRODUCTS */
    .products {
      display:grid;
      grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      padding:20px;
    }

    /* GLASS CARD */
    .card {
      background:rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius:15px;
      padding:15px;
      border:1px solid rgba(255,255,255,0.1);
      transition:0.4s;
      opacity:0;
      transform:translateY(40px);
    }

    .card.show {
      opacity:1;
      transform:translateY(0);
    }

    .card:hover {
      transform:scale(1.05);
      box-shadow:0 0 25px #00f0ff;
    }

    img {
      width:100%;
      height:200px;
      border-radius:10px;
    }

    .btn {
      display:inline-block;
      margin-top:10px;
      padding:8px 15px;
      background:#00f0ff;
      color:black;
      border-radius:5px;
      text-decoration:none;
    }

    .contact {
      text-align:center;
      padding:30px;
      background:rgba(0,0,0,0.7);
    }
  </style>
</head>

<body>

<header>
  <h1>GIRI METALS</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#products">Products</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- FILTER -->
<div class="filters">
  <button onclick="filter('all')">All</button>
  <button onclick="filter('vessel')">Vessels</button>
  <button onclick="filter('tank')">Tanks</button>
</div>

<div class="products" id="products">

  <div class="card vessel">
    <img src="https://via.placeholder.com/300x200">
    <h3>Steel Vessel</h3>
    <a href="https://wa.me/919600091817?text=Steel Vessel" class="btn">Enquire</a>
  </div>

  <div class="card tank">
    <img src="https://via.placeholder.com/300x200">
    <h3>Storage Tank</h3>
    <a href="https://wa.me/919600091817?text=Storage Tank" class="btn">Enquire</a>
  </div>

  <div class="card vessel">
    <img src="https://via.placeholder.com/300x200">
    <h3>Steel Drum</h3>
    <a href="https://wa.me/919600091817?text=Steel Drum" class="btn">Enquire</a>
  </div>

</div>

<div class="contact" id="contact">
  <h2>Contact Us</h2>
  <a href="tel:+917010169587" class="btn">Call</a>
</div>

<script>
  // FILTER SYSTEM
  function filter(type){
    let cards=document.querySelectorAll(".card");
    cards.forEach(c=>{
      if(type==="all" || c.classList.contains(type)){
        c.style.display="block";
      } else {
        c.style.display="none";
      }
    });
  }

  // SCROLL ANIMATION
  let cards=document.querySelectorAll(".card");
  window.addEventListener("scroll",()=>{
    cards.forEach(card=>{
      let top=card.getBoundingClientRect().top;
      if(top < window.innerHeight-50){
        card.classList.add("show");
      }
    });
  });
</script>

</body>
</html>
